spring:
  cloud:
    gateway:
      routes:
        - id: digi-wallet-user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**,/api/v1/user/**,/api/v1/admin/**,/api/v1/contacts/**

        - id: digi-wallet-notification-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/notification/**

        - id: digi-wallet-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/wallet/**

        - id: digi-wallet-transaction-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/transaction/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true